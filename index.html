<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具箱 - 实用的在线工具集合</title>
  <style>
    :root {
      --bg: #0B0F19;
      --surface: #151B2B;
      --surface-hover: #1E2538;
      --primary: #3B82F6;
      --primary-hover: #2563EB;
      --primary-glow: rgba(59,130,246,0.25);
      --accent: #8B5CF6;
      --accent-glow: rgba(139,92,246,0.25);
      --text: #F1F5F9;
      --text-secondary: #94A3B8;
      --border: #1E293B;
      --border-hover: #334155;
      --success: #10B981;
      --error: #EF4444;
      --radius: 16px;
      --radius-sm: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .nav {
      background: rgba(21,27,43,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 20px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-brand svg { width: 32px; height: 32px; color: var(--primary); }
    .nav-links { display: flex; gap: 8px; }
    .nav-link {
      padding: 10px 18px;
      border-radius: 10px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .nav-link:hover, .nav-link.active {
      background: rgba(59,130,246,0.12);
      color: var(--primary);
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 48px 24px; }
    .hero {
      text-align: center;
      padding: 60px 24px 48px;
    }
    .hero h1 {
      font-size: 48px;
      font-weight: 900;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #60A5FA, #3B82F6, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: var(--text-secondary);
      font-size: 18px;
      max-width: 520px;
      margin: 0 auto;
    }
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }
    .tool-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 32px;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
    }
    .tool-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, var(--primary-glow), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .tool-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 60px var(--primary-glow);
    }
    .tool-card:hover::before { opacity: 1; }
    .tool-card > * { position: relative; z-index: 1; }
    .tool-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px var(--primary-glow);
    }
    .tool-icon svg { color: white; }
    .tool-card h3 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .tool-card p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .tool-tag {
      display: inline-block;
      font-size: 12px;
      color: var(--primary);
      background: rgba(59,130,246,0.12);
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 16px;
      font-weight: 600;
      border: 1px solid rgba(59,130,246,0.15);
    }
    .footer {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
      font-size: 14px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    @media (max-width: 640px) {
      .hero h1 { font-size: 32px; }
      .hero { padding: 40px 16px 32px; }
      .tools-grid { padding: 0 16px 40px; grid-template-columns: 1fr; }
      .nav { padding: 0 16px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <path d="M8 12l3 3 5-5"/>
      </svg>
      工具箱
    </a>
    <div class="nav-links">
      <a href="./index.html" class="nav-link active">首页</a>
    </div>
  </nav>

  <div class="hero">
    <h1>实用工具箱</h1>
    <p>简洁、高效的在线工具集合，所有处理在本地完成，保护你的隐私</p>
  </div>

  <div class="tools-grid">
    <a href="./remove-bg.html" class="tool-card">
      <div class="tool-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18"/>
          <path d="M9 21V9"/>
        </svg>
      </div>
      <h3>AI 智能抠图</h3>
      <p>一键移除图片背景，支持画笔精修。纯前端处理，图片不上传服务器。</p>
      <span class="tool-tag">图片处理</span>
    </a>

    <a href="./name-gen.html" class="tool-card">
      <div class="tool-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </div>
      <h3>AI 名字生成器</h3>
      <p>输入平台和风格，AI 帮你生成独特的名字。支持游戏、社交、品牌等多种场景。</p>
      <span class="tool-tag">AI 生成</span>
    </a>
  </div>

  <footer class="footer">
    <p>工具箱 - 实用的在线工具集合</p>
  </footer>
</body>
</html>
