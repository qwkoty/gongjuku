<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 名字生成器 - 工具箱</title>
  <style>
    :root {
      --bg: #0B0F19;
      --surface: #151B2B;
      --surface-hover: #1E2538;
      --primary: #3B82F6;
      --primary-hover: #2563EB;
      --primary-glow: rgba(59,130,246,0.25);
      --accent: #8B5CF6;
      --accent-glow: rgba(139,92,246,0.25);
      --text: #F1F5F9;
      --text-secondary: #94A3B8;
      --border: #1E293B;
      --border-hover: #334155;
      --success: #10B981;
      --error: #EF4444;
      --warning: #F59E0B;
      --radius: 16px;
      --radius-sm: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .nav {
      background: rgba(21,27,43,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 20px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-brand svg { width: 32px; height: 32px; color: var(--primary); }
    .nav-links { display: flex; gap: 8px; }
    .nav-link {
      padding: 10px 18px;
      border-radius: 10px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
    }
    .nav-link:hover, .nav-link.active {
      background: rgba(59,130,246,0.12);
      color: var(--primary);
    }
    .container { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #60A5FA, #3B82F6, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-header p { color: var(--text-secondary); font-size: 16px; }

    .model-status {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .model-status-info { display: flex; align-items: center; gap: 10px; }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--text-secondary);
      position: relative;
    }
    .status-dot.loading {
      background: var(--warning);
      animation: pulse 1.5s infinite;
    }
    .status-dot.ready { background: var(--success); }
    .status-dot.error { background: var(--error); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text { font-size: 14px; font-weight: 500; }
    .status-text.ready { color: var(--success); }
    .status-text.loading { color: var(--warning); }
    .status-text.error { color: var(--error); }
    .model-badge {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .form-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 24px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-hint {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      box-shadow: 0 4px 20px var(--primary-glow);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--primary-glow); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .result-area { margin-top: 24px; }
    .result-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--primary), var(--accent));
    }
    .result-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .result-meaning {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .result-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn-small {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .btn-small:hover { border-color: var(--primary); color: var(--primary); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      color: var(--text-secondary);
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-sm);
      padding: 16px;
      color: var(--error);
      font-size: 14px;
      text-align: center;
    }

    .tag-select {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .tag-option {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag-option:hover { border-color: var(--border-hover); color: var(--text); }
    .tag-option.active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 16px var(--primary-glow);
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--bg);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.active { display: block; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .footer {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
      font-size: 14px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    @media (max-width: 640px) {
      .page-header h1 { font-size: 28px; }
      .container { padding: 24px 16px; }
      .form-card { padding: 20px; }
      .nav { padding: 0 16px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <path d="M8 12l3 3 5-5"/>
      </svg>
      工具箱
    </a>
    <div class="nav-links">
      <a href="./remove-bg.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18"/>
          <path d="M9 21V9"/>
        </svg>
        图片
      </a>
      <a href="./name-gen.html" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        文字
      </a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>AI 名字生成器</h1>
      <p>本地 AI 模型，无需联网，保护隐私</p>
    </div>

    <div class="model-status" id="modelStatus">
      <div class="model-status-info">
        <div class="status-dot loading" id="statusDot"></div>
        <span class="status-text loading" id="statusText">正在加载 AI 模型...</span>
      </div>
      <span class="model-badge">Gemma 3 270M</span>
      <div class="progress-bar active" id="progressBar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-group">
        <label class="form-label">使用平台</label>
        <input type="text" id="platform" class="form-input" placeholder="例如：游戏、微信、抖音、品牌、博客...">
        <p class="form-hint">你想在哪个平台使用这个名字？</p>
      </div>

      <div class="form-group">
        <label class="form-label">风格偏好</label>
        <div class="tag-select" id="styleTags">
          <span class="tag-option" data-value="文艺">文艺</span>
          <span class="tag-option" data-value="酷炫">酷炫</span>
          <span class="tag-option" data-value="可爱">可爱</span>
          <span class="tag-option" data-value="古风">古风</span>
          <span class="tag-option" data-value="简约">简约</span>
          <span class="tag-option" data-value="搞笑">搞笑</span>
          <span class="tag-option" data-value="神秘">神秘</span>
          <span class="tag-option" data-value="霸气">霸气</span>
        </div>
        <input type="hidden" id="style" value="">
      </div>

      <div class="form-group">
        <label class="form-label">额外要求（可选）</label>
        <textarea id="extra" class="form-textarea" placeholder="例如：包含某个字、不要太长、英文+数字组合..."></textarea>
      </div>

      <button id="generateBtn" class="btn btn-primary" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <span id="btnText">等待模型加载...</span>
      </button>
    </div>

    <div id="resultArea" class="result-area"></div>
  </div>

  <footer class="footer">
    <p>工具箱 - 所有 AI 处理在本地完成，不上传任何数据</p>
  </footer>

  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.0/+esm';

    // 使用国内镜像加速模型下载
    env.remoteHost = 'https://hf-mirror.com/';

    const MODEL_ID = 'onnx-community/gemma-3-270m-it-ONNX';
    let generator = null;
    let modelReady = false;

    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const generateBtn = document.getElementById('generateBtn');
    const btnText = document.getElementById('btnText');
    const resultArea = document.getElementById('resultArea');

    // 风格标签选择
    const styleTags = document.querySelectorAll('.tag-option');
    const styleInput = document.getElementById('style');
    styleTags.forEach(tag => {
      tag.addEventListener('click', () => {
        styleTags.forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        styleInput.value = tag.dataset.value;
      });
    });

    // 更新状态
    function updateStatus(state, message, progress = null) {
      statusDot.className = 'status-dot ' + state;
      statusText.className = 'status-text ' + state;
      statusText.textContent = message;
      if (progress !== null) {
        progressFill.style.width = progress + '%';
      }
      if (state === 'ready') {
        progressBar.classList.remove('active');
        generateBtn.disabled = false;
        btnText.textContent = '生成名字';
      } else if (state === 'error') {
        progressBar.classList.remove('active');
        generateBtn.disabled = true;
        btnText.textContent = '模型加载失败';
      }
    }

    // 加载模型
    async function loadModel() {
      try {
        updateStatus('loading', '正在加载 AI 模型...', 10);

        generator = await pipeline('text-generation', MODEL_ID, {
          dtype: 'q4',
          device: 'cpu',
          progress_callback: (data) => {
            if (data.status === 'progress') {
              const pct = Math.round((data.loaded / data.total) * 100);
              updateStatus('loading', `正在下载模型... ${pct}%`, pct);
            } else if (data.status === 'ready') {
              updateStatus('loading', '正在初始化模型...', 95);
            }
          }
        });

        modelReady = true;
        updateStatus('ready', 'AI 模型已就绪，可以开始生成');
      } catch (err) {
        console.error('模型加载失败:', err);
        updateStatus('error', '模型加载失败: ' + (err.message || '未知错误'));
        resultArea.innerHTML = `
          <div class="error-msg">
            模型加载失败，请检查网络连接后刷新页面重试。<br>
            错误信息: ${err.message || '未知错误'}
          </div>
        `;
      }
    }

    // 生成名字
    generateBtn.addEventListener('click', async () => {
      const platform = document.getElementById('platform').value.trim();
      const style = styleInput.value;
      const extra = document.getElementById('extra').value.trim();

      if (!platform) {
        alert('请输入使用平台');
        return;
      }
      if (!modelReady || !generator) {
        alert('模型尚未加载完成，请稍候');
        return;
      }

      generateBtn.disabled = true;
      btnText.textContent = '生成中...';
      resultArea.innerHTML = '<div class="loading"><div class="spinner"></div>AI 正在思考...</div>';

      try {
        const prompt = buildPrompt(platform, style, extra);
        const output = await generator(prompt, {
          max_new_tokens: 256,
          temperature: 0.8,
          do_sample: true,
          return_full_text: false
        });

        const text = output[0]?.generated_text || '';
        const names = parseNames(text);

        if (names.length === 0) {
          resultArea.innerHTML = '<div class="error-msg">未能生成有效名字，请重试</div>';
        } else {
          renderResults(names);
        }
      } catch (err) {
        console.error('生成失败:', err);
        resultArea.innerHTML = `<div class="error-msg">生成失败: ${err.message || '未知错误'}</div>`;
      }

      generateBtn.disabled = false;
      btnText.textContent = '生成名字';
    });

    // 构建提示词
    function buildPrompt(platform, style, extra) {
      let prompt = `请为"${platform}"平台生成5个${style || '独特'}风格的名字。`;
      if (extra) {
        prompt += `额外要求：${extra}。`;
      }
      prompt += `\n\n请按以下格式输出（每行一个名字，名字后面用"|"分隔，后面写上含义）：\n`;
      prompt += `名字1 | 含义1\n名字2 | 含义2\n名字3 | 含义3\n名字4 | 含义4\n名字5 | 含义5\n\n输出：`;
      return prompt;
    }

    // 解析生成的名字
    function parseNames(text) {
      const names = [];
      const lines = text.split('\n');
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        // 匹配 "名字 | 含义" 格式
        const match = trimmed.match(/^(.+?)\s*[\|｜]\s*(.+)$/);
        if (match) {
          const name = match[1].trim().replace(/^\d+[\.、]\s*/, '');
          const meaning = match[2].trim();
          if (name && name.length <= 20) {
            names.push({ name, meaning });
          }
        }
      }
      // 如果解析失败，尝试简单分行
      if (names.length === 0) {
        for (const line of lines) {
          const trimmed = line.trim().replace(/^\d+[\.、]\s*/, '');
          if (trimmed && trimmed.length <= 20 && !trimmed.includes('：') && !trimmed.includes('名称')) {
            names.push({ name: trimmed, meaning: `适合${document.getElementById('platform').value}使用` });
          }
        }
      }
      return names.slice(0, 5);
    }

    // 渲染结果
    function renderResults(names) {
      resultArea.innerHTML = names.map((item, i) => `
        <div class="result-card">
          <div class="result-name">${escapeHtml(item.name)}</div>
          ${item.meaning ? `<div class="result-meaning">${escapeHtml(item.meaning)}</div>` : ''}
          <div class="result-actions">
            <button class="btn-small" onclick="copyText('${item.name.replace(/'/g, "\\'")}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
              复制
            </button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    window.copyText = function(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('已复制：' + text);
      });
    };

    // 启动加载
    loadModel();
  </script>
</body>
</html>
