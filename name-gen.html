<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 名字生成器 - 工具箱</title>
  <style>
    :root {
      --bg: #0B0F19;
      --surface: #151B2B;
      --surface-hover: #1E2538;
      --primary: #3B82F6;
      --primary-hover: #2563EB;
      --primary-glow: rgba(59,130,246,0.25);
      --accent: #8B5CF6;
      --accent-glow: rgba(139,92,246,0.25);
      --text: #F1F5F9;
      --text-secondary: #94A3B8;
      --border: #1E293B;
      --border-hover: #334155;
      --success: #10B981;
      --error: #EF4444;
      --radius: 16px;
      --radius-sm: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .nav {
      background: rgba(21,27,43,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 20px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-brand svg { width: 32px; height: 32px; color: var(--primary); }
    .nav-links { display: flex; gap: 8px; }
    .nav-link {
      padding: 10px 18px;
      border-radius: 10px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .nav-link:hover, .nav-link.active {
      background: rgba(59,130,246,0.12);
      color: var(--primary);
    }
    .container { max-width: 800px; margin: 0 auto; padding: 48px 24px; }
    .page-header { text-align: center; margin-bottom: 40px; }
    .page-header h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #60A5FA, #3B82F6, #A78BFA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .page-header p { color: var(--text-secondary); font-size: 16px; }

    .form-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 24px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .form-textarea { min-height: 80px; resize: vertical; }
    .form-hint {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      box-shadow: 0 4px 20px var(--primary-glow);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px var(--primary-glow); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .result-area { margin-top: 24px; }
    .result-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .result-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--primary), var(--accent));
    }
    .result-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .result-meaning {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .result-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn-small {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .btn-small:hover { border-color: var(--primary); color: var(--primary); }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      color: var(--text-secondary);
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-sm);
      padding: 16px;
      color: var(--error);
      font-size: 14px;
      text-align: center;
    }

    .tag-select {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .tag-option {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag-option:hover { border-color: var(--border-hover); color: var(--text); }
    .tag-option.active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 16px var(--primary-glow);
    }

    .footer {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
      font-size: 14px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    @media (max-width: 640px) {
      .page-header h1 { font-size: 28px; }
      .container { padding: 24px 16px; }
      .form-card { padding: 20px; }
      .nav { padding: 0 16px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="./index.html" class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="2" width="20" height="20" rx="5"/>
        <path d="M8 12l3 3 5-5"/>
      </svg>
      工具箱
    </a>
    <div class="nav-links">
      <a href="./remove-bg.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18"/>
          <path d="M9 21V9"/>
        </svg>
        图片
      </a>
      <a href="./name-gen.html" class="nav-link active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        文字
      </a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>AI 名字生成器</h1>
      <p>输入平台和风格，AI 帮你生成独特的名字</p>
    </div>

    <div class="form-card">
      <div class="form-group">
        <label class="form-label">使用平台</label>
        <input type="text" id="platform" class="form-input" placeholder="例如：游戏、微信、抖音、品牌、博客...">
        <p class="form-hint">你想在哪个平台使用这个名字？</p>
      </div>

      <div class="form-group">
        <label class="form-label">风格偏好</label>
        <div class="tag-select" id="styleTags">
          <span class="tag-option" data-value="文艺">文艺</span>
          <span class="tag-option" data-value="酷炫">酷炫</span>
          <span class="tag-option" data-value="可爱">可爱</span>
          <span class="tag-option" data-value="古风">古风</span>
          <span class="tag-option" data-value="简约">简约</span>
          <span class="tag-option" data-value="搞笑">搞笑</span>
          <span class="tag-option" data-value="神秘">神秘</span>
          <span class="tag-option" data-value="霸气">霸气</span>
        </div>
        <input type="hidden" id="style" value="">
      </div>

      <div class="form-group">
        <label class="form-label">额外要求（可选）</label>
        <textarea id="extra" class="form-textarea" placeholder="例如：包含某个字、不要太长、英文+数字组合..."></textarea>
      </div>

      <button id="generateBtn" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        生成名字
      </button>
    </div>

    <div id="resultArea" class="result-area"></div>
  </div>

  <footer class="footer">
    <p>工具箱 - 实用的在线工具集合</p>
  </footer>

  <script>
    // 风格标签选择
    const styleTags = document.querySelectorAll('.tag-option');
    const styleInput = document.getElementById('style');
    styleTags.forEach(tag => {
      tag.addEventListener('click', () => {
        styleTags.forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        styleInput.value = tag.dataset.value;
      });
    });

    const generateBtn = document.getElementById('generateBtn');
    const resultArea = document.getElementById('resultArea');

    generateBtn.addEventListener('click', async () => {
      const platform = document.getElementById('platform').value.trim();
      const style = styleInput.value;
      const extra = document.getElementById('extra').value.trim();

      if (!platform) {
        alert('请输入使用平台');
        return;
      }

      generateBtn.disabled = true;
      resultArea.innerHTML = '<div class="loading"><div class="spinner"></div>AI 正在思考...</div>';

      try {
        const names = await generateNames(platform, style, extra);
        renderResults(names);
      } catch (err) {
        resultArea.innerHTML = '<div class="error-msg">生成失败：' + err.message + '</div>';
      } finally {
        generateBtn.disabled = false;
      }
    });

    async function generateNames(platform, style, extra) {
      const prompt = `请为"${platform}"平台生成5个${style ? style + '风格' : ''}的名字${extra ? '，要求：' + extra : ''}。

请按以下格式返回，每个名字占一行：
名字|含义解释

例如：
星尘旅者|寓意在浩瀚星空中自由探索的旅行者
墨染青衣|古风雅致，如墨色渲染的青衣书生

只返回名字列表，不要其他内容。`;

      const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer 93d3f1e1e7eb4c0e8e3b8b3c7d3e3b3e.8wD6V0jP1gH2kL4'
        },
        body: JSON.stringify({
          model: 'glm-4-flash',
          messages: [
            { role: 'system', content: '你是一个专业的名字生成助手，擅长根据平台和风格生成有创意、有寓意的名字。' },
            { role: 'user', content: prompt }
          ],
          temperature: 0.8,
          max_tokens: 500
        })
      });

      if (!response.ok) throw new Error('API 请求失败');
      const data = await response.json();
      const content = data.choices[0].message.content;

      // 解析返回的名字
      const names = [];
      const lines = content.split('\n').filter(l => l.trim());
      for (const line of lines) {
        const parts = line.split('|');
        if (parts.length >= 2) {
          names.push({ name: parts[0].trim(), meaning: parts[1].trim() });
        } else if (line.trim() && !line.includes('：') && !line.includes(':')) {
          names.push({ name: line.trim(), meaning: '' });
        }
      }
      return names;
    }

    function renderResults(names) {
      if (names.length === 0) {
        resultArea.innerHTML = '<div class="error-msg">未能生成有效名字，请重试</div>';
        return;
      }

      resultArea.innerHTML = names.map((item, i) => `
        <div class="result-card">
          <div class="result-name">${item.name}</div>
          ${item.meaning ? `<div class="result-meaning">${item.meaning}</div>` : ''}
          <div class="result-actions">
            <button class="btn-small" onclick="copyText('${item.name.replace(/'/g, "\\'")}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
              复制
            </button>
          </div>
        </div>
      `).join('');
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('已复制：' + text);
      });
    }
  </script>
</body>
</html>
